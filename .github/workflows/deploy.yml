name: Test and Deploy Apigee Proxy

on:
  push:
    branches:
      - main

jobs:
  unit-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: npm run coverage

      - name: Upload test & coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-and-coverage-reports
          path: |
            test-report
            coverage

  deploy:
    name: Deploy Proxy to Apigee
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode service account key
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_FILE }}" | base64 -d > sa-key.json

      - name: Install apigeecli
        run: |
          curl -L https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | sh -
          echo "$HOME/.apigeecli/bin" >> "$GITHUB_PATH"

      - name: Deploy proxy to Apigee
        run: |
          apigeecli apis create bundle \
            -f ./apiproxy \
            -n helloworld \
            -o ${{ vars.ORG }} \
            -e ${{ vars.APIGEE_ENVIRONMENT }} \
            --ovr \
            -a sa-key.json

      - name: Clean up service account key
        if: always()
        run: rm -f sa-key.json